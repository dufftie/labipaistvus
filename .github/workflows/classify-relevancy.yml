name: Classify Article Relevancy

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

concurrency:
  group: classify-relevancy
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-classify-v1

      - name: Install dependencies
        run: pip install -r apps/analyser/requirements.txt

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-dufftie-gemma3-270m-v1

      - name: Run classification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          OMP_NUM_THREADS: '4'
          MKL_NUM_THREADS: '4'
        run: python apps/analyser/src/classify_relevancy.py